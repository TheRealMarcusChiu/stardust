# ─────────────────────────────────────────────────────────────────────────────
#  Knowledge Garden — site configuration
#
#  Edit the values below, then run `node build.js`. The build injects them into
#  index.html. These are the only "personal" values in the site — everything
#  else is generated from your vault.
# ─────────────────────────────────────────────────────────────────────────────

# Browser tab title.
title: "/var/log"

# Wordmark shown top-left in the header.
brand: "/var/log"

# Small caption beside the wordmark.
subtitle: "knowledge garden"

# Your site's public URL (used internally; safe to leave blank).
site_url: "https://git.marcuschiu.com/var-log/"

# Hidden signature easter egg: typing the `trigger` word anywhere flashes a
# credit overlay. Leave `trigger` empty ("") to disable it entirely.
signature:
  trigger: "marcus"
  text: "✦ tended by Marcus Chiu ✦"
  url: "git.marcuschiu.com"

# giscus comments (https://giscus.app). Set `enabled: false` to hide the
# discussion section. To turn it on, set `enabled: true` and fill repo / repo_id
# / category / category_id from giscus.
giscus:
  enabled: false
  repo: "therealmarcuschiu/var-log"
  repo_id: "R_kgDOSxZkzQ"
  category: "General"
  category_id: "DIC_kwDOSxZkzc4C-tDZ"
  theme: "transparent_dark"

# Graph layout. When a vault grows large, the live force simulation gets slow
# and "jiggly" — set `precompute: true` and the build runs the simulation once
# (same forces as the browser) and bakes every node's x/y into garden-data.js.
# The 2D canvas then renders those static positions instantly: no simulation
# runs in the browser at all.
#
# Expanding / collapsing children and descendants stays fully enabled: the
# layout is computed for the WHOLE graph, so each node has a permanent home and
# expand/collapse simply shows or hides nodes in place (no reflow, no drift).
# Dragging nodes still works too — a dragged node just stays where you drop it.
layout:
  precompute: false
  # Simulation ticks used at build time (more = more settled; 300 ≈ what the
  # browser would run).
  iterations: 300

# Multiple vaults. When `multi: true`, each top-level folder / .md directly
# inside ./vault is treated as its OWN independent garden (own root, own
# tree), and the header shows a vault switcher to flip between them. When
# false (default), multiple top-level entries are tied together under one
# synthesized root instead (see build.js). With a single top-level entry this
# setting changes nothing.
vaults:
  multi: false
